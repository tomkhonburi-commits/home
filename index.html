        // --- Custom Hook for LocalStorage ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        const PinModal = ({ isOpen, onClose, onSuccess }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState(false);
            const correctPin = '1234'; 

            useEffect(() => { if (!isOpen) { setPin(''); setError(false); } }, [isOpen]);

            useEffect(() => {
                if (pin.length === 4) {
                if (pin === correctPin) { onSuccess(); } 
                else { setError(true); setTimeout(() => { setPin(''); setError(false); }, 800); }
                }
            }, [pin]);

            const handleNumClick = (num) => { if (pin.length < 4 && !error) setPin(prev => prev + num); };

            return (

        const ScoreEntryModal = ({ match, onClose, appColors, onSave }) => {
            if (!match) return null;
            
            const initialTeams = (match.versus || '').split(' vs ');
            const [team1Name, setTeam1Name] = useState(initialTeams[0] ? initialTeams[0].trim() : '');

                const t2ColorId = matchColorText(team2Name, appColors);

                let loserId = null;
                const s1 = Number(score1);
                const s2 = Number(score2);

                    winnerId = t1ColorId;
                    loserId = t2ColorId;

                    loserId = t1ColorId;

        function App() {
            const [viewState, setViewState] = useState('loading'); 
            const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
            const [showPinModal, setShowPinModal] = useState(false);

            // States (Using LocalStorage to prevent data reset on refresh)
            const [appColors, setAppColors] = useLocalStorage('appColors_v2', initialTeamColors);
            const [appSports, setAppSports] = useLocalStorage('appSports_v2', initialSports);
            const [appAges, setAppAges] = useLocalStorage('appAges_v2', initialAges);
            const [appSettings, setAppSettings] = useLocalStorage('appSettings_v2', initialSettings);
            const [activeSchedules, setActiveSchedules] = useLocalStorage('activeSchedules_v2', mockSchedules);

            useEffect(() => {
                const timer = setTimeout(() => setViewState('public'), 800);
                return () => clearTimeout(timer);
            }, []);

            const handleUpdateMatch = (matchId, resultData) => {
                setActiveSchedules(prev => 
                    prev.map(s => s.id === matchId ? { ...s, ...resultData } : s)
                );
            };

            // คำนวณเหรียญอัตโนมัติจากผลการแข่งขัน
            const calculatedColors = useMemo(() => {
                return appColors.map(team => {
                    let gold = 0; let silver = 0; let bronze = 0;
                    activeSchedules.forEach(match => {
                        if (match.status === 'announced') {
                            if (match.round.includes('ชิงชนะเลิศ') || match.round.includes('ชิง 1')) {
                                if (match.winner === team.id) gold += 1;
                                if (match.loser === team.id) silver += 1; // สมมติว่าแพ้ชิงได้เงิน
                            }
                        }
                    });
                    const score = (gold * 5) + (silver * 3) + (bronze * 1);
                    return { ...team, gold, silver, bronze, score };
                }).sort((a, b) => {
                    if (b.gold !== a.gold) return b.gold - a.gold;
                    if (b.silver !== a.silver) return b.silver - a.silver;
                    return b.bronze - a.bronze;
                }).map((t, idx) => ({ ...t, rank: idx + 1 }));
            }, [appColors, activeSchedules]);

            if (viewState === 'loading') {
                return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#380222] text-white">
                    <div className="relative flex items-center justify-center mb-8">
                    <div className="absolute w-32 h-32 border-4 border-pink-500/30 rounded-full border-t-pink-500 animate-spin"></div>
                    <div className="absolute w-28 h-28 border-4 border-dashed border-pink-400/20 rounded-full animate-[spin_3s_linear_reverse]"></div>
                    <div className="bg-pink-500 p-5 rounded-2xl relative z-10 shadow-[0_0_30px_rgba(236,72,153,0.5)]"><Activity size={40} className="text-white" /></div>
                    </div>
                    <h2 className="text-pink-400 text-sm tracking-widest mb-4 font-light">{appSettings.siteName}</h2>
                    <h1 className="text-2xl font-bold mb-4 tracking-wide">กำลังเตรียมหน้าเว็บไซต์...</h1>
                </div>
                );
            }

            return (
                <div className="relative h-screen w-full bg-gray-50">
                {viewState === 'public' ? (
                    <PublicView 
                    viewState={viewState} setViewState={setViewState} 
                    isAdminAuthenticated={isAdminAuthenticated} setShowPinModal={setShowPinModal} 
                    appColors={appColors} calculatedColors={calculatedColors} appSports={appSports} appSettings={appSettings}
                    schedules={activeSchedules} dateOptions={dateOptions}
                    /> 
                ) : (
                    <AdminView 
                    viewState={viewState} setViewState={setViewState}
                    appColors={appColors} setAppColors={setAppColors}
                    appSports={appSports} setAppSports={setAppSports}
                    appAges={appAges} setAppAges={setAppAges}
                    appSettings={appSettings} setAppSettings={setAppSettings}
                    schedules={activeSchedules} dateOptions={dateOptions}
                    onUpdateMatch={handleUpdateMatch}
                    />
                )}

                <PinModal 
                    isOpen={showPinModal} 
                    onClose={() => setShowPinModal(false)}
                    onSuccess={() => { setIsAdminAuthenticated(true); setShowPinModal(false); setViewState('admin'); }}
                />
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
