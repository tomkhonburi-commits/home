        function useLocalStorage(key, initialValue) {
        const [storedValue, setStoredValue] = useState(() => {
            try {
            const item = window.localStorage.getItem(key);
            return item ? JSON.parse(item) : initialValue;
            } catch (error) {
            console.error(error);
            return initialValue;
            }
        });

        const setValue = (value) => {
            try {
            const valueToStore = value instanceof Function ? value(storedValue) : value;
            setStoredValue(valueToStore);
            window.localStorage.setItem(key, JSON.stringify(valueToStore));
            } catch (error) {
            console.error(error);
            }
        };
        return [storedValue, setValue];

            { label: 'สีฟ้า', bg: 'bg-blue-500', text: 'text-blue-700', border: 'border-blue-500' },
            { label: 'สีเขียว', bg: 'bg-green-500', text: 'text-green-700', border: 'border-green-500' },
            { label: 'สีชมพู', bg: 'bg-pink-500', text: 'text-pink-700', border: 'border-pink-500' },
            { label: 'สีเหลือง', bg: 'bg-yellow-400', text: 'text-yellow-700', border: 'border-yellow-400' },
        ];

        const handleAdd = () => {
            if(newName.trim()) {
            const theme = themeOptions.find(t => t.bg === selectedTheme);
            setColors([...colors, { id: `color_${Date.now()}`, name: newName.trim(), bg: theme.bg, text: theme.text, border: theme.border, score: 0, gold: 0, silver: 0, bronze: 0, rank: colors.length + 1 }]);
            setNewName('');
            }
        };

        const handleDelete = (id) => { setColors(colors.filter(c => c.id !== id)); };

        return (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 md:p-8">
            <div className="flex items-center gap-3 mb-6 text-[#cc0066]">
                <div className="w-10 h-10 rounded-xl bg-pink-100 flex items-center justify-center"><Palette size={20} /></div>
                <h3 className="text-xl font-black text-gray-800">จัดการคณะสี</h3>
            </div>
            
            <div className="flex flex-col md:flex-row gap-3 mb-6">
                <input type="text" placeholder="ชื่อคณะสี (เช่น สีม่วง)" value={newName} onChange={e=>setNewName(e.target.value)} className="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#cc0066]" />
                <select value={selectedTheme} onChange={e=>setSelectedTheme(e.target.value)} className="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-[#cc0066]">
                {themeOptions.map(t => <option key={t.bg} value={t.bg}>{t.label}</option>)}
                </select>
                <button onClick={handleAdd} className="bg-[#cc0066] text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-pink-700 shadow-md active:scale-95"><Plus size={18}/> เพิ่มคณะสี</button>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                {colors.map((color) => (
                <div key={color.id} className="border border-gray-200 rounded-xl p-4 flex items-center justify-between bg-white shadow-sm hover:shadow-md transition-shadow">
                    <div className="flex items-center gap-3">
                        <div className={`w-8 h-8 rounded-full ${color.bg} shadow-sm border-2 border-white`}></div>
                        <span className="font-bold text-gray-800">{color.name}</span>
                    </div>
                    <button onClick={()=>handleDelete(color.id)} className="p-2 text-gray-400 hover:text-red-500 bg-gray-50 hover:bg-red-50 rounded-lg"><Trash2 size={16}/></button>
                </div>
                ))}
            </div>
            </div>
        );
        };


        // --- ADMIN VIEW ---
        const AdminView = ({ setViewState, appColors, setAppColors, appSports, setAppSports, appAges, setAppAges, appSettings, setAppSettings, schedules, dateOptions, onUpdateMatch }) => {
        const [activeTab, setActiveTab] = useState('matches');
        const [selectedMatch, setSelectedMatch] = useState(null);
        const [filterSport, setFilterSport] = useState('All');
        const [search, setSearch] = useState('');
        const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

        const filteredSchedules = useMemo(() => {
            return schedules.filter(s => {
            const matchSport = filterSport === 'All' || s.sport === filterSport;
            const matchSearch = (s.versus || '').includes(search) || (s.age || '').includes(search);
            return matchSport && matchSearch;
            });
        }, [schedules, filterSport, search]);

        const handleSaveScore = (matchId, winnerId) => {
            onUpdateMatch(matchId, winnerId);
        }

        return (
            <div className="flex h-screen bg-gray-50 font-sans overflow-hidden">
            {isMobileMenuOpen && <div className="fixed inset-0 bg-black/50 z-40 md:hidden" onClick={() => setIsMobileMenuOpen(false)} />}
            <aside className={`fixed md:static inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 flex flex-col h-full shrink-0 transition-transform ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                <div className="flex items-center gap-3">
                    <div className="bg-[#cc0066] text-white p-3 rounded-2xl shadow-md"><Lock size={24} /></div>
                    <div><h1 className="font-black text-gray-800 text-base">โหมดกรรมการ</h1></div>
                </div>
                <button className="md:hidden text-gray-400" onClick={() => setIsMobileMenuOpen(false)}><X size={20}/></button>
                </div>
                <div className="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
                <p className="text-xs font-bold text-gray-400 mb-2 px-2 uppercase">จัดการแข่งขัน</p>
                <button onClick={() => {setActiveTab('matches'); setIsMobileMenuOpen(false);}} className={`flex items-center gap-3 px-4 py-3.5 text-sm w-full text-left rounded-xl transition-colors ${activeTab === 'matches' ? 'bg-[#cc0066] text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <LayoutDashboard size={18}/><span className="font-bold">บันทึกผลการแข่งขัน</span>
                </button>
                
                <p className="text-xs font-bold text-gray-400 mt-6 mb-2 px-2 uppercase">ตั้งค่าระบบ</p>
                <button onClick={() => {setActiveTab('sports'); setIsMobileMenuOpen(false);}} className={`flex items-center gap-3 px-4 py-3.5 text-sm w-full text-left rounded-xl transition-colors ${activeTab === 'sports' ? 'bg-[#cc0066] text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <Dribbble size={18}/><span className="font-bold">ชนิดกีฬา</span>
                </button>
                <button onClick={() => {setActiveTab('categories'); setIsMobileMenuOpen(false);}} className={`flex items-center gap-3 px-4 py-3.5 text-sm w-full text-left rounded-xl transition-colors ${activeTab === 'categories' ? 'bg-[#cc0066] text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <Users size={18}/><span className="font-bold">รุ่นอายุ / ประเภท</span>
                </button>
                <button onClick={() => {setActiveTab('colors'); setIsMobileMenuOpen(false);}} className={`flex items-center gap-3 px-4 py-3.5 text-sm w-full text-left rounded-xl transition-colors ${activeTab === 'colors' ? 'bg-[#cc0066] text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <Palette size={18}/><span className="font-bold">คณะสี</span>
                </button>
                <button onClick={() => {setActiveTab('settings'); setIsMobileMenuOpen(false);}} className={`flex items-center gap-3 px-4 py-3.5 text-sm w-full text-left rounded-xl transition-colors ${activeTab === 'settings' ? 'bg-[#cc0066] text-white shadow-md' : 'text-gray-600 hover:bg-gray-100'}`}>
                    <SettingsIcon size={18}/><span className="font-bold">ตั้งค่าเว็บไซต์</span>
                </button>
                </div>
                <div className="p-4 border-t border-gray-100 bg-white">
                <button onClick={() => setViewState('public')} className="flex items-center justify-center gap-2 w-full py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm hover:bg-gray-200">
                    <LogOut size={16}/> กลับหน้าหลัก
                </button>
                </div>
            </aside>
            
            <main className="flex-1 flex flex-col h-full overflow-hidden bg-gray-50/50">
                <header className="bg-white border-b border-gray-200 h-20 flex items-center justify-between px-4 md:px-6 shrink-0 shadow-sm z-0">
                <div className="flex items-center gap-4">
                    <button onClick={() => setIsMobileMenuOpen(true)} className="p-2 md:hidden text-gray-600 hover:bg-gray-100 rounded-lg"><Menu size={24} /></button>
                    <h2 className="text-xl font-black text-gray-800 hidden md:block border-l-4 border-[#cc0066] pl-3">{appSettings.siteName}</h2>
                    <h2 className="text-lg font-black text-[#cc0066] md:hidden">โหมดจัดการ</h2>
                </div>
                <div className="flex items-center gap-4">
                    <div className="hidden md:flex items-center gap-2 bg-pink-50 text-[#cc0066] px-4 py-2 rounded-full border border-pink-100">
                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span className="text-sm font-bold">Admin Active</span>
                    </div>
                </div>
                </header>
                
                <div className="flex-1 overflow-y-auto p-4 md:p-8">
                    {activeTab === 'matches' && (
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 md:p-8">
                        <div className="flex flex-col mb-6">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-pink-100 text-[#cc0066] flex items-center justify-center shrink-0"><Activity size={24} /></div>
                            <div><h3 className="text-lg md:text-xl font-black text-gray-800">บันทึกผลการแข่งขัน</h3><p className="text-xs text-gray-500">คลิกที่ปุ่ม "บันทึกผล" เพื่อระบุผู้ชนะ</p></div>
                        </div>
                        <div className="flex flex-col md:flex-row gap-3 mb-4">
                            <div className="relative flex-1">
                            <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" size={18} />
                            <input type="text" placeholder="ค้นหารุ่น หรือ ทีม..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-pink-500" />
                            </div>
                            <select value={filterSport} onChange={(e) => setFilterSport(e.target.value)} className="py-3 px-4 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold text-gray-700 focus:outline-none focus:border-pink-500">
                            <option value="All">ทุกกีฬา</option>
                            {appSports.map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>
                        </div>
            
                        <div className="overflow-x-auto rounded-xl border border-gray-200">
                        <table className="w-full text-sm text-left bg-white min-w-[600px]">
                            <thead className="bg-gray-100 text-gray-700 border-b border-gray-200">
                            <tr><th className="py-4 px-4 font-bold">วันที่/เวลา</th><th className="py-4 px-4 font-bold">ชนิดกีฬา</th><th className="py-4 px-4 font-bold">รุ่นอายุ</th><th className="py-4 px-4 font-bold">คู่แข่งขัน</th><th className="py-4 px-4 font-bold text-center">จัดการ</th></tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                            {filteredSchedules.length > 0 ? filteredSchedules.map((match) => (
                                <tr key={match.id} className="hover:bg-gray-50">
                                <td className="py-4 px-4"><div className="font-bold text-gray-700 whitespace-nowrap">{match.date}</div><div className="text-xs text-gray-500 whitespace-nowrap">{match.time}</div></td>
                                <td className="py-4 px-4 font-bold text-[#cc0066]">
                                    <div className="flex items-center gap-2 mt-2 whitespace-nowrap">{getSportIcon(match.sport)} {match.sport}</div>
                                </td>
                                <td className="py-4 px-4 text-gray-700 font-medium whitespace-nowrap">
                                    {match.age}
                                    {match.round === 'ชิงชนะเลิศ' && <div className="mt-1 text-[10px] bg-gradient-to-r from-amber-100 to-yellow-100 text-amber-700 px-2 py-0.5 rounded border border-amber-200 inline-block font-bold">ชิงชนะเลิศ</div>}
                                </td>
                                <td className="py-4 px-4">
                                    <div className="flex items-center gap-1.5 whitespace-nowrap">
                                    {(match.versus || '').split(' vs ').map((team, idx) => {
                                        const colorData = appColors.find(c => c.id === matchColorText(team, appColors));
                                        return (
                                        <React.Fragment key={idx}>
                                            {idx > 0 && <span className="text-gray-300 text-xs font-medium">vs</span>}
                                            <span className={`px-2.5 py-1 rounded-md text-xs font-bold shadow-sm ${colorData ? `${colorData.bg} text-white` : 'bg-gray-200 text-gray-700'}`}>{team}</span>
                                        </React.Fragment>
                                        )
                                    })}
                                    </div>
                                </td>
                                <td className="py-4 px-4 text-center">
                                    <button onClick={() => setSelectedMatch(match)} className={`px-4 py-2 rounded-xl text-xs font-black tracking-wide whitespace-nowrap transition-all duration-300 active:scale-95 ${match.status === 'announced' ? 'bg-white border-2 border-gray-200 text-gray-600 hover:bg-gray-100' : 'bg-[#cc0066] text-white shadow-[0_4px_12px_rgba(204,0,102,0.3)] hover:bg-[#b30059]'}`}>
                                        {match.status === 'announced' ? 'แก้ไขผล' : 'บันทึกผล'}
                                    </button>
                                </td>
                                </tr>
                            )) : (<tr><td colSpan="5" className="py-12 text-center text-gray-400">ไม่มีข้อมูล</td></tr>)}
                            </tbody>
                        </table>
                        </div>
                    </div>
                    )}

                    {activeTab === 'sports' && <ManageSimpleList title="จัดการชนิดกีฬา" icon={<Dribbble size={20}/>} placeholder="ระบุชื่อกีฬาใหม่..." items={appSports} setItems={setAppSports} />}
                    {activeTab === 'categories' && <ManageSimpleList title="จัดการรุ่นอายุ/ประเภท" icon={<Users size={20}/>} placeholder="ระบุรุ่นอายุใหม่ (เช่น 18ปีหญิง)..." items={appAges} setItems={setAppAges} />}
                    {activeTab === 'colors' && <ManageColors colors={appColors} setColors={setAppColors} />}
                    {activeTab === 'settings' && <ManageSettings settings={appSettings} setSettings={setAppSettings} />}

                </div>
            </main>
            <ScoreEntryModal match={selectedMatch} onClose={() => setSelectedMatch(null)} appColors={appColors} onSave={onUpdateMatch} />
            </div>
        );
        };


        // === MAIN APP ===
        function App() {
        const [viewState, setViewState] = useState('loading'); 
        const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
        const [showPinModal, setShowPinModal] = useState(false);

        // States (Using LocalStorage to prevent data reset)
        const [appColors, setAppColors] = useLocalStorage('appColors', initialTeamColors);
        const [appSports, setAppSports] = useLocalStorage('appSports', initialSports);
        const [appAges, setAppAges] = useLocalStorage('appAges', initialAges);
        const [appSettings, setAppSettings] = useLocalStorage('appSettings', initialSettings);
        const [activeSchedules, setActiveSchedules] = useLocalStorage('activeSchedules', mockSchedules);

        useEffect(() => {
            const timer = setTimeout(() => setViewState('public'), 800);
            return () => clearTimeout(timer);
        }, []);

        const handleUpdateMatch = (matchId, winnerId) => {
            setActiveSchedules(prev => 
            prev.map(s => s.id === matchId ? { ...s, status: 'announced', winner: winnerId } : s)
            );
        };

        if (viewState === 'loading') {
            return (
            <div className="flex flex-col items-center justify-center min-h-screen bg-[#380222] text-white">
                <div className="relative flex items-center justify-center mb-8">
                <div className="absolute w-32 h-32 border-4 border-pink-500/30 rounded-full border-t-pink-500 animate-spin"></div>
                <div className="absolute w-28 h-28 border-4 border-dashed border-pink-400/20 rounded-full animate-[spin_3s_linear_reverse]"></div>
                <div className="bg-pink-500 p-5 rounded-2xl relative z-10 shadow-[0_0_30px_rgba(236,72,153,0.5)]"><Activity size={40} className="text-white" /></div>
                </div>
                <h2 className="text-pink-400 text-sm tracking-widest mb-4 font-light">{appSettings.siteName}</h2>
                <h1 className="text-2xl font-bold mb-4 tracking-wide">กำลังเตรียมหน้าเว็บไซต์...</h1>
            </div>
            );
        }

        return (
            <div className="relative h-screen w-full bg-gray-50">
            {viewState === 'public' ? (
                <PublicView 
                viewState={viewState} setViewState={setViewState} 
                isAdminAuthenticated={isAdminAuthenticated} setShowPinModal={setShowPinModal} 
                appColors={appColors} appSports={appSports} appSettings={appSettings}
                schedules={activeSchedules} dateOptions={dateOptions}
                /> 
            ) : (
                <AdminView 
                viewState={viewState} setViewState={setViewState}
                appColors={appColors} setAppColors={setAppColors}
                appSports={appSports} setAppSports={setAppSports}
                appAges={appAges} setAppAges={setAppAges}
                appSettings={appSettings} setAppSettings={setAppSettings}
                schedules={activeSchedules} dateOptions={dateOptions}
                onUpdateMatch={handleUpdateMatch}
                />
            )}

            <PinModal 
                isOpen={showPinModal} 
                onClose={() => setShowPinModal(false)}
                onSuccess={() => { setIsAdminAuthenticated(true); setShowPinModal(false); setViewState('admin'); }}
            />
            </div>
        );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
